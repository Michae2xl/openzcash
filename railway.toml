# Railway deploy config for the Zcash Back Office (ZBO).
#
# Pure Next.js app (Nixpacks builds it: npm install -> npm run build -> npm run
# start). Network access is NODE-LESS: a public lightwalletd (LWD_URL, e.g.
# zec.rocks:443) covers the chain tip + transparent address scanning, and the
# ppf-scanner service covers UFVK validation/derivation. No home node required.
#
# Cron note: vercel.json crons are ignored here. Add a Railway cron service (or
# any scheduler) that hits GET /api/cron/refresh with `Authorization: Bearer
# $CRON_SECRET` every 6h. The in-render stale-on-load refresh is the fallback.

[build]
builder = "NIXPACKS"

[deploy]
# Apply DB migrations on boot (prod-deps only, best-effort), then start.
# `next start` honors $PORT. Migrations run from inside Railway's network — the
# Postgres host is only reachable on the private network. Healthcheck hits a
# DB-free page so app-boot is what's measured, not data readiness.
startCommand = "node scripts/migrate.mjs && node scripts/seed-governance.mjs && npm run start"
healthcheckPath = "/login"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
